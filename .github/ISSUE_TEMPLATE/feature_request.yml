name: Feature request
description: Suggest a scoped improvement.
title: "[Feature]: "
labels: ["type: feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - translation
        - EPUB compatibility
        - UI
        - packaging
        - library management
        - provider support
        - other
  - type: textarea
    id: why
    attributes:
      label: Why this matters
